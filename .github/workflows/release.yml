# Release workflow for the Tenstorrent fork of terraform-provider-dns.
# Triggers on vX.Y.Z tags pushed to the repo.
# Requires two repository secrets:
#   GPG_PRIVATE_KEY  — ASCII-armored GPG private key used to sign the release checksums
#   GPG_FINGERPRINT  — fingerprint of the above key (passed to gpg --local-user)
#   GITHUB_TOKEN     — automatically provided by Actions

name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
